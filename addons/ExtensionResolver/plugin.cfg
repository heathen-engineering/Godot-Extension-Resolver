[plugin]

name="Extension Resolver for Godot"
description="Dependency resolution for Godot extensions: reads each installed addon's extension.manifest.json, checks declared dependencies against min/max version constraints, offers to fetch missing or out-of-range ones from their declared source, and performs the .gdextension.available unlock step for gated native extensions. Adds a Project Settings tab listing every installed extension, its version, dependency health, and update availability. Pure GDScript — no native code, no dependencies of its own, so it can be installed by unzipping into res://addons/ and enabling, with no load-order risk. Generic, not Heathen-specific: any Godot extension author can ship an extension.manifest.json and get resolution for free. See docs/manifest-schema.md for the manifest format."
author="Heathen Engineering Limited"
version="0.1.4"
script="ExtensionResolverEditorPlugin.gd"
